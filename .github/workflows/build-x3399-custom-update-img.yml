#========================================================
# Build Armbian for RK3399 9tripod (x3399)
# FULL VERSION - STABLE
#========================================================

name: Build x3399-9tripod Armbian IMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    #--------------------------------------------------
    # 1. Checkout your repo
    #--------------------------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    #--------------------------------------------------
    # 2. System prepare (提高成功率关键)
    #--------------------------------------------------
    - name: Prepare system
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget unzip \
          build-essential \
          gcc g++ \
          bc bison flex \
          libssl-dev \
          libncurses5-dev \
          libelf-dev \
          device-tree-compiler \
          python3 python3-pip \
          qemu-user-static \
          debootstrap \
          zip dosfstools \
          rsync

    #--------------------------------------------------
    # 3. Clone ophub build system
    #--------------------------------------------------
    - name: Clone ophub repo
      run: |
        git clone https://github.com/ophub/amlogic-s9xxx-armbian.git build

    #--------------------------------------------------
    # 4. Inject model_database.conf
    #--------------------------------------------------
    - name: Inject model_database.conf
      run: |
        cp -f amlogic-s9xxx-armbian/build-armbian/armbian-files/common-files/etc/model_database.conf \
        build/build-armbian/armbian-files/common-files/etc/model_database.conf

    #--------------------------------------------------
    # 5. Inject custom DTS
    #--------------------------------------------------
    - name: Inject custom DTS
      run: |
        mkdir -p build/custom-dts
        cp -rf amlogic-s9xxx-armbian/custom-dts/* build/custom-dts/

    #--------------------------------------------------
    # 6. Pre-config (关键稳定性)
    #--------------------------------------------------
    - name: Pre-config
      run: |
        cd build

        # 提高编译稳定性
        echo "FORCE_UNSAFE_CONFIGURE=1" >> userpatches/config-default.conf
        echo "EXPERT=yes" >> userpatches/config-default.conf
        echo "USE_CCACHE=no" >> userpatches/config-default.conf

    #--------------------------------------------------
    # 7. Build Armbian (RK3399)
    #--------------------------------------------------
    - name: Build Armbian
      run: |
        cd build

        chmod +x compile.sh

        ./compile.sh \
          BOARD=rockpi-4b \
          BRANCH=current \
          RELEASE=jammy \
          BUILD_MINIMAL=no \
          BUILD_DESKTOP=no \
          KERNEL_ONLY=no \
          KERNEL_CONFIGURE=no \
          COMPRESS_OUTPUTIMAGE=sha,img

    #--------------------------------------------------
    # 8. Replace DTB/DTS into image
    #--------------------------------------------------
    - name: Replace DTS
      run: |
        cd build/output/images

        for img in *.img; do
          echo "Processing $img"

          mkdir -p tmp
          sudo mount -o loop $img tmp

          # 复制你的 DTS（覆盖）
          if [ -f ../../custom-dts/rk3399-9tripod-custom.dts ]; then
            sudo cp ../../custom-dts/rk3399-9tripod-custom.dts \
            tmp/boot/dtb/rockchip/rk3399-9tripod.dts
          fi

          sudo umount tmp
          rm -rf tmp
        done

    #--------------------------------------------------
    # 9. Compress image (方便下载)
    #--------------------------------------------------
    - name: Compress IMG
      run: |
        cd build/output/images
        for img in *.img; do
          gzip -f $img
        done

    #--------------------------------------------------
    # 10. Upload artifact
    #--------------------------------------------------
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: x3399-armbian-img
        path: build/output/images/*.img.gz
