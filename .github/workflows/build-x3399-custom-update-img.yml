#==========================================================================
# Description: Build Armbian arm64 with custom DTS for x3399-9tripod
#==========================================================================

name: Build x3399 Custom Armbian IMG

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "Select OS Release."
        required: false
        default: "bookworm"
        type: choice
        options:
          - trixie
          - bookworm
      armbian_kernel:
        description: "Select kernel version."
        required: false
        default: "6.1.y"
        type: choice
        options:
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
      kernel_usage:
        description: "Set the tags of the kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - beta
      armbian_fstype:
        description: "Select armbian rootfs type."
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs

env:
  TZ: Etc/UTC
  CUSTOM_DTS_PATH: custom-dts
  MODEL_DB_PATH: build-armbian/armbian-files/common-files/etc/model_database.conf

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E apt-get -y install u-boot-tools device-tree-compiler btrfs-progs
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E timedatectl set-ntp true
          date -u
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create extended storage
        id: storage
        if: ${{ steps.init.outputs.status == 'success' }}
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          if [[ -z "$mnt_size" || -z "$root_size" ]]; then
            echo "Failed to calculate sizes"
            exit 1
          fi
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download Armbian source
        id: download
        working-directory: /builder
        if: ${{ steps.storage.outputs.status == 'success' }}
        run: |
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Prepare custom files (DTS and model_database)
        id: prepare
        if: ${{ steps.download.outputs.status == 'success' }}
        run: |
          mkdir -p /builder/build/arch/arm64/boot/dts/rockchip/custom
          echo "Copying custom DTS files..."
          cp -v ${GITHUB_WORKSPACE}/${CUSTOM_DTS_PATH}/*.dts* /builder/build/arch/arm64/boot/dts/rockchip/custom/ 2>/dev/null || true

          echo "Updating model_database.conf..."
          if [[ -f "${GITHUB_WORKSPACE}/${MODEL_DB_PATH}" ]]; then
            mkdir -p /builder/build/build-armbian/armbian-files/common-files/etc
            cp -v "${GITHUB_WORKSPACE}/${MODEL_DB_PATH}" /builder/build/build-armbian/armbian-files/common-files/etc/model_database.conf
            echo "✓ model_database.conf updated"
          else
            echo "model_database.conf not found (skip)"
          fi

          ls -lh /builder/build/arch/arm64/boot/dts/rockchip/custom/ || echo "No custom DTS files"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build Armbian image (rebuild)
        id: rebuild
        if: ${{ steps.prepare.outputs.status == 'success' }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x ./rebuild
          ./rebuild \
            -b rk3399 \
            -r ${{ inputs.set_release }} \
            -k ${{ inputs.armbian_kernel }} \
            -u ${{ inputs.kernel_usage }} \
            -t ${{ inputs.armbian_fstype }}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload Armbian image
        if: ${{ steps.rebuild.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: x3399-9tripod-armbian-img
          path: |
            build/output/images/*.img
            build/output/images/*.zip
          if-no-files-found: error
