#========================================================
# Build Armbian for RK3399 9tripod (x3399)
# FINAL FIXED VERSION (PATH CORRECTED)
#========================================================

name: Build x3399-9tripod Armbian IMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    #--------------------------------------------------
    # 1. Checkout 当前仓库
    #--------------------------------------------------
    - name: Checkout source
      uses: actions/checkout@v4

    #--------------------------------------------------
    # 2. 安装依赖（稳定编译关键）
    #--------------------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget unzip \
          build-essential \
          gcc g++ \
          bc bison flex \
          libssl-dev \
          libncurses5-dev \
          libelf-dev \
          device-tree-compiler \
          python3 python3-pip \
          qemu-user-static \
          debootstrap \
          zip dosfstools \
          rsync

    #--------------------------------------------------
    # 3. 克隆 ophub 官方仓库
    #--------------------------------------------------
    - name: Clone ophub repo
      run: |
        git clone https://github.com/ophub/amlogic-s9xxx-armbian.git build

    #--------------------------------------------------
    # 4. 注入 model_database.conf（已修复路径）
    #--------------------------------------------------
    - name: Inject model_database.conf
      run: |
        echo "Copy model_database.conf..."

        cp -f build-armbian/armbian-files/common-files/etc/model_database.conf \
        build/build-armbian/armbian-files/common-files/etc/model_database.conf

    #--------------------------------------------------
    # 5. 注入 custom DTS
    #--------------------------------------------------
    - name: Inject custom DTS
      run: |
        echo "Copy custom DTS..."

        mkdir -p build/custom-dts
        cp -rf custom-dts/* build/custom-dts/

    #--------------------------------------------------
    # 6. 编译前优化（成功率关键）
    #--------------------------------------------------
    - name: Pre-config
      run: |
        cd build

        echo "FORCE_UNSAFE_CONFIGURE=1" >> userpatches/config-default.conf
        echo "EXPERT=yes" >> userpatches/config-default.conf
        echo "USE_CCACHE=no" >> userpatches/config-default.conf

    #--------------------------------------------------
    # 7. 编译 Armbian（RK3399）
    #--------------------------------------------------
    - name: Build Armbian
      run: |
        cd build

        chmod +x compile.sh

        ./compile.sh \
          BOARD=rockpi-4b \
          BRANCH=current \
          RELEASE=jammy \
          BUILD_MINIMAL=no \
          BUILD_DESKTOP=no \
          KERNEL_ONLY=no \
          KERNEL_CONFIGURE=no \
          COMPRESS_OUTPUTIMAGE=sha,img

    #--------------------------------------------------
    # 8. 注入 DTS 到镜像（关键）
    #--------------------------------------------------
    - name: Replace DTS in IMG
      run: |
        cd build/output/images

        for img in *.img; do
          echo "Processing $img"

          mkdir -p tmp
          sudo mount -o loop $img tmp

          # 覆盖 dtb
          if [ -f ../../custom-dts/rk3399-9tripod-custom.dts ]; then
            sudo cp ../../custom-dts/rk3399-9tripod-custom.dts \
            tmp/boot/dtb/rockchip/rk3399-9tripod.dts
          fi

          sync
          sudo umount tmp
          rm -rf tmp
        done

    #--------------------------------------------------
    # 9. 压缩镜像
    #--------------------------------------------------
    - name: Compress IMG
      run: |
        cd build/output/images
        for img in *.img; do
          gzip -f $img
        done

    #--------------------------------------------------
    # 10. 上传结果
    #--------------------------------------------------
    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: x3399-armbian-img
        path: build/output/images/*.img.gz
