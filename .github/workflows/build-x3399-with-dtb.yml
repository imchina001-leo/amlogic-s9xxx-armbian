name: Build X3399 Custom Armbian

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version'
        required: true
        default: '6.1.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ccache build-essential linux-libc-dev \
            libncurses5-dev libncursesw5-dev u-boot-tools \
            bc kmod cpio libssl-dev device-tree-compiler \
            bison flex gcc-aarch64-linux-gnu dosfstools \
            mtools fakeroot parted udev rsync wget

      - name: Prepare custom DTS
        run: |
          # 创建内核源码目录结构
          mkdir -p compile-kernel/kernel/arch/arm64/boot/dts/rockchip
          
          # 复制自定义 dts 文件
          cp -v custom-dts/*.dts* compile-kernel/kernel/arch/arm64/boot/dts/rockchip/
          
          # 添加 Makefile 条目
          echo 'dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3399-9tripod-custom.dtb' >> compile-kernel/kernel/arch/arm64/boot/dts/rockchip/Makefile
          
          echo "Custom DTS files prepared:"
          ls -la compile-kernel/kernel/arch/arm64/boot/dts/rockchip/

      - name: Build with rebuild
        run: |
          # 使用 sudo 以 root 权限运行
          sudo ./rebuild -b x3399-9tripod -k ${{ github.event.inputs.kernel_version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x3399-armbian-image-${{ github.run_id }}
          path: |
            build/output/images/*.img
            build/output/images/*.img.gz
          if-no-files-found: warn
