name: Build X3399 Custom Armbian

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version'
        required: true
        default: '6.1.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ccache build-essential linux-libc-dev \
            libncurses5-dev libncursesw5-dev u-boot-tools \
            bc kmod cpio libssl-dev device-tree-compiler \
            bison flex gcc-aarch64-linux-gnu dosfstools \
            mtools fakeroot parted udev rsync wget

      - name: Download kernel source
        run: |
          sudo ./recompile -k ${{ github.event.inputs.kernel_version }} \
                           -m rk3399 \
                           -n

      - name: Inject custom DTS files
        run: |
          KERNEL_DIR="compile-kernel/kernel"
          DTS_DIR="$KERNEL_DIR/arch/arm64/boot/dts/rockchip"
          mkdir -p "$DTS_DIR"
          cp custom-dts/*.dts* "$DTS_DIR/"
          echo 'dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3399-9tripod-custom.dtb' >> "$DTS_DIR/Makefile"
          echo "Injected files:"
          ls -la "$DTS_DIR" | grep -E "rk3399|lcd"

      - name: Compile kernel and dtb
        run: |
          sudo ./recompile -k ${{ github.event.inputs.kernel_version }} \
                           -m rk3399 \
                           -s \
                           -v true

      - name: Rebuild Armbian image
        run: |
          sudo ./rebuild -b x3399-9tripod \
                         -k ${{ github.event.inputs.kernel_version }} \
                         -v true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x3399-armbian-image-${{ github.run_id }}
          path: |
            build/output/images/*.img
            build/output/images/*.img.gz
            compile-kernel/output/*.dtb
          if-no-files-found: warn
