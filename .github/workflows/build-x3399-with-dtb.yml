name: Build X3399 with Existing DTB

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version'
        required: true
        default: '6.1.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ccache build-essential linux-libc-dev \
            libncurses5-dev libncursesw5-dev u-boot-tools \
            bc kmod cpio libssl-dev device-tree-compiler \
            bison flex gcc-aarch64-linux-gnu dosfstools \
            mtools fakeroot parted udev rsync wget

      - name: Download base Armbian image from Releases
        id: download_base
        run: |
          # 查询最新的基础镜像
          BASE_IMAGE=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases?per_page=5 | \
            jq -r '.[] | .assets[] | select(.name | test("Armbian_.*_trunk_.*\.img\.gz")) | .browser_download_url' | \
            head -1)
          
          if [ -z "$BASE_IMAGE" ]; then
            echo "Error: No base Armbian image found in Releases"
            exit 1
          fi
          
          echo "Downloading base image: $BASE_IMAGE"
          mkdir -p build/output/images
          wget -O build/output/images/base.img.gz "$BASE_IMAGE"
          cd build/output/images && gunzip base.img.gz && mv base.img Armbian_base.img
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare custom DTB
        run: |
          # 创建 boot 目录结构
          mkdir -p boot_temp/dtb/rockchip
          
          # 复制你的 dtb 文件（如果 custom-dts 中有，或者指定位置）
          if [ -f "custom-dts/rk3399-9tripod-custom.dtb" ]; then
            cp custom-dts/rk3399-9tripod-custom.dtb boot_temp/dtb/rockchip/
          else
            # 如果 dtb 不在 custom-dts 中，尝试其他位置
            find . -name "rk3399-9tripod-custom.dtb" -exec cp {} boot_temp/dtb/rockchip/ \;
          fi
          
          # 创建 extlinux 配置文件
          mkdir -p boot_temp/extlinux
          cat > boot_temp/extlinux/extlinux.conf << 'EOF'
          LABEL Armbian
          LINUX /Image
          FDT /dtb/rockchip/rk3399-9tripod-custom.dtb
          APPEND root=PARTUUID=614e0000-0000-4d53-8000-1b280001234b rw rootwait console=ttyS2,115200n8 console=tty0
          EOF

      - name: Rebuild Armbian image with custom DTB
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: build/output/images/Armbian_base.img
          armbian_board: x3399-9tripod
          armbian_kernel: ${{ github.event.inputs.kernel_version }}
          auto_kernel: true
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_fstype: ext4
          builder_name: imchina001-leo
          # 添加自定义文件（将你的 dtb 复制到正确位置）
          armbian_files: boot_temp/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x3399-armbian-with-dtb
          path: |
            build/output/images/*.img
            build/output/images/*.img.gz
          if-no-files-found: warn
