name: Build X3399 Custom Armbian

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version'
        required: true
        default: '6.1.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ccache build-essential linux-libc-dev \
            libncurses5-dev libncursesw5-dev u-boot-tools \
            bc kmod cpio libssl-dev device-tree-compiler \
            bison flex gcc-aarch64-linux-gnu dosfstools \
            mtools fakeroot parted udev rsync wget

      - name: Download and compile kernel with custom DTS
        run: |
          # 直接使用 recompile 编译，让脚本自己处理下载和编译
          # -k 指定内核版本，-m 指定 SOC 型号，-v 显示详细信息
          sudo ./recompile -k ${{ github.event.inputs.kernel_version }} \
                           -m rk3399 \
                           -v true
        env:
          # 设置环境变量，让 recompile 知道内核源码位置
          KERNEL_SOURCE_PATH: compile-kernel/kernel

      - name: Inject custom DTS files after kernel download
        run: |
          # 等待内核源码下载完成
          sleep 5
          
          # 检查内核源码目录
          KERNEL_DIR="compile-kernel/kernel"
          if [ ! -d "$KERNEL_DIR" ]; then
            echo "Error: Kernel source directory not found"
            exit 1
          fi
          
          DTS_DIR="$KERNEL_DIR/arch/arm64/boot/dts/rockchip"
          mkdir -p "$DTS_DIR"
          
          # 复制自定义 dts 文件
          if [ -d "custom-dts" ]; then
            cp -v custom-dts/*.dts* "$DTS_DIR/"
          else
            echo "Warning: custom-dts directory not found"
          fi
          
          # 添加到 Makefile
          echo 'dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3399-9tripod-custom.dtb' >> "$DTS_DIR/Makefile"
          
          echo "Custom DTS files injected to: $DTS_DIR"
          ls -la "$DTS_DIR" | grep -E "rk3399|9tripod|lcd"

      - name: Recompile kernel with custom DTS
        run: |
          # 重新编译内核（使用已有的源码目录）
          sudo ./recompile -k ${{ github.event.inputs.kernel_version }} \
                           -m rk3399 \
                           -s \
                           -v true
        env:
          KERNEL_SOURCE_PATH: compile-kernel/kernel

      - name: Rebuild Armbian image
        run: |
          sudo ./rebuild -b x3399-9tripod \
                         -k ${{ github.event.inputs.kernel_version }} \
                         -v true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x3399-armbian-image-${{ github.run_id }}
          path: |
            build/output/images/*.img
            build/output/images/*.img.gz
            compile-kernel/output/*.dtb
          if-no-files-found: warn
